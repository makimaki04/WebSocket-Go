<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSocket Chat</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background: #f8f9fa;
    }

    .chat-card {
      max-width: 820px;
      margin: 48px auto;
      border: 0;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #0d6efd, #0b5ed7);
      color: #fff;
      padding: 20px 24px;
    }

    #chat {
      height: 420px;
      overflow-y: auto;
      background: #ffffff;
      padding: 16px;
    }

    .message {
      border-radius: 12px;
      margin-bottom: 12px;
      padding: 12px 14px;
      background: #f1f3f5;
    }

    .message--mine {
      background: #dbeafe;
      margin-left: 48px;
    }

    .message--other {
      background: #f1f3f5;
      margin-right: 48px;
    }

    .message-meta {
      font-size: 12px;
      color: #6c757d;
      margin-bottom: 6px;
    }

    .message-text {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      background: #dc3545;
      margin-right: 8px;
    }

    .status-dot.connected {
      background: #198754;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="card chat-card">
      <div class="chat-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <h2 class="h4 mb-1">WebSocket Chat</h2>
          <div class="small opacity-75">Join the page and start chatting right away</div>
        </div>
        <div class="d-flex align-items-center small">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">Disconnected</span>
        </div>
      </div>

      <div class="card-body p-0">
        <div id="chat"></div>
      </div>

      <div class="card-footer bg-white border-0 p-3">
        <div class="row g-2 mb-2">
          <div class="col-12">
            <input type="text" id="wsUrlInput" class="form-control" placeholder="ws://localhost:8080/ws" />
          </div>
        </div>

        <div class="input-group">
          <input
            type="text"
            id="messageInput"
            class="form-control"
            placeholder="Type a message..."
          />
          <button id="sendButton" class="btn btn-primary">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let socket = null;

    const chat = document.getElementById('chat');
    const wsUrlInput = document.getElementById('wsUrlInput');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    wsUrlInput.value = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}/ws`;
    connectWebSocket();

    function setStatus(connected, text) {
      statusDot.classList.toggle('connected', connected);
      statusText.textContent = text;
    }

    function addMessage(time, address, message) {
      const messageElement = document.createElement('div');
      messageElement.classList.add('message', 'message--other');

      const meta = document.createElement('div');
      meta.classList.add('message-meta');
      meta.textContent = `${time} • ${address}`;

      const text = document.createElement('p');
      text.classList.add('message-text');
      text.textContent = message;

      messageElement.appendChild(meta);
      messageElement.appendChild(text);
      chat.appendChild(messageElement);
      chat.scrollTop = chat.scrollHeight;
    }

    function connectWebSocket() {
      if (socket && socket.readyState === WebSocket.OPEN) {
        return;
      }

      const url = wsUrlInput.value.trim();
      if (!url) {
        return;
      }

      socket = new WebSocket(url);
      setStatus(false, 'Connecting...');

      socket.onopen = () => {
        setStatus(true, 'Connected');
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          addMessage(data.time || '', data.address || 'unknown', data.message || '');
        } catch {
          addMessage('', 'server', event.data);
        }
      };

      socket.onerror = () => {
        setStatus(false, 'Error');
      };

      socket.onclose = () => {
        setStatus(false, 'Disconnected');
      };
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      if (!socket || socket.readyState !== WebSocket.OPEN) {
        return;
      }

      socket.send(JSON.stringify({ message: text }));
      messageInput.value = '';
      messageInput.focus();
    }

    sendButton.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
